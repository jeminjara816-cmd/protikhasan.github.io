<!DOCTYPE html>
<html>
<head>
    <title>PROTIK HASAN - Official</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official website of PROTIK HASAN - Digital Creator | Tech Lover | Bangladesh">

    <!-- Open Graph / Social Meta -->
    <meta property="og:title" content="PROTIK HASAN">
    <meta property="og:description" content="Digital Creator | Tech Lover | Bangladesh">
    <meta property="og:image" content="https://protikhasan.github.io/profile.jpg">
    <meta property="og:url" content="https://protikhasan.github.io">
    <meta property="og:type" content="website">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: 'Poppins', sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
            background-size:400% 400%;
            animation: gradientBG 10s ease infinite;
            color:white;
            text-align:center;
        }
        @keyframes gradientBG{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        .card{
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            padding:40px;
            border-radius:20px;
            width:400px;
            animation: fadeIn 1.5s ease;
        }
        @keyframes fadeIn{from{opacity:0; transform:translateY(30px);}to{opacity:1; transform:translateY(0);}}
        img{
            width:150px;
            height:150px;
            border-radius:50%;
            border:4px solid white;
            object-fit:cover;
            animation: pop 1s ease;
        }
        @keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
        h1{margin-top:20px;font-size:30px;letter-spacing:2px;}
        p{font-size:16px;margin-top:8px;opacity:0.9;}
        .info{margin-top:15px;text-align:left;}
        .info p{margin:5px 0;font-size:14px;opacity:0.8;}
        .links a{
            display:block;
            margin:10px 0;
            padding:12px;
            background:white;
            color:#2c5364;
            text-decoration:none;
            border-radius:8px;
            font-weight:600;
            transition:0.3s;
        }
        .links a:hover{transform:scale(1.05);background:#e0e0e0;}
        footer{margin-top:20px;font-size:12px;opacity:0.7;}
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="PROTIK HASAN">
        <h1>PROTIK HASAN</h1>
        <p>| FREELANCER | Bangladesh</p>

        <div class="info">
            <p><strong>Full Name:</strong> PROTIK HASAN</p>
            <p><strong>Religion:</strong> Islam</p>
            <p><strong>Country:</strong> Bangladesh</p>
            <p><strong>Email:</strong> protikhasan559@gmail.com.com</p>
        </div>

        <div class="links">
            <a href="https://facebook.com/yourfacebook">Facebook</a>
            <a href="https://instagram.com/yourinstagram">Instagram</a>
            <a href="https://linkedin.com/in/yourlinkedin">LinkedIn</a>
            <a href="https://twitter.com/yourtwitter">Twitter</a>
        </div>

        <footer>© 2026 PROTIK HASAN</footer>
    </div>
</body>
</html>
